name: E2E tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Check out backend
        uses: actions/checkout@v6
        with:
          repository: brocoders/nestjs-boilerplate
          # Use token for private repository
          # token: ${{ secrets.CI_PAT }}
          path: backend
      - run: cd backend && cp env-example-document .env
      - name: Run backend
        # print output of the command to file and store it as artifact
        run: cd backend && docker compose -f docker-compose.document.yaml up > ${{ runner.temp }}/backend.log 2>&1 &
      - run: cd backend && sed -i 's/\r//g' wait-for-it.sh
      - run: cd backend && ./wait-for-it.sh localhost:3001 -- echo "Backend is up"

      - name: Check out frontend
        uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}
      # Cache hit: binaries already present; only (re)install the apt system libs,
      # which are NOT stored in the ms-playwright cache and are quick to install.
      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      # Cache miss: full download, but bounded per attempt and retried so a
      # throttled/stalled CDN connection fails fast instead of eating the job budget.
      - name: Install Playwright browsers (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: |
          for i in 1 2 3; do
            timeout 600 npx playwright install --with-deps chromium && exit 0
            echo "Attempt $i failed or stalled; retrying in 15s..." && sleep 15
          done
          echo "Playwright install failed after 3 attempts" && exit 1
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: backend-log
          path: ${{ runner.temp }}/backend.log
          retention-days: 30
